spring.application.name=ProductRental

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/northernarc
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Transaction Configuration
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false
springdoc.swagger-ui.use-root-path=true

# JWT Configuration
app.jwtSecret=thisIsAVeryLongSecretKeyForJWTTokenGenerationAndValidationThatMustBeAtLeast256Bits
app.jwtExpirationMs=86400000


