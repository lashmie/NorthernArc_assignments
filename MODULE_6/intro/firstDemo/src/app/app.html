<h2>Employee Management</h2>

Name

<input
type="text"
[(ngModel)]="employee.name">

<br><br>

Salary

<input
type="number"
[(ngModel)]="employee.salary">

<br><br>

<button (click)="addEmployee()">

Add Employee

</button>

<br><br>

<button (click)="sortAscending()">

Salary Ascending

</button>

<button (click)="sortDescending()">

Salary Descending

</button>

<br><br>

<table border="1">

<tr>

<th>Id</th>

<th>Name</th>

<th>Salary</th>

<th>Delete</th>

</tr>

@for(emp of employees(); track emp.id){

<tr>

<td>{{emp.id}}</td>

<td>{{emp.name}}</td>

<td>{{emp.salary}}</td>

<td>

<button (click)="deleteEmployee(emp.id)">

Delete

</button>

</td>

</tr>

}

</table>
