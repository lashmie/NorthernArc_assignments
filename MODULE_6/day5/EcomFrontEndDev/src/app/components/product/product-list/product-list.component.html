<section class="card shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h2 class="h4 mb-0">Products</h2>
    <a class="btn btn-sm btn-primary" routerLink="/add-product" *ngIf="isAdmin()">Add Product</a>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="searchType" name="searchType">
        <option value="all">All</option>
        <option value="name">By Name</option>
        <option value="brand">By Brand</option>
        <option value="category">By Category</option>
      </select>
    </div>
    <div class="col-md-6">
      <input
        class="form-control"
        name="searchText"
        [(ngModel)]="searchText"
        [disabled]="searchType === 'all'"
        placeholder="Type name / brand / category"
      />
    </div>
    <div class="col-md-3 d-flex gap-2">
      <button class="btn btn-outline-primary w-100" type="button" (click)="search()">Search</button>
      <button class="btn btn-outline-secondary w-100" type="button" (click)="clearSearch()">Reset</button>
    </div>
  </div>

  <div class="table-responsive" *ngIf="products().length > 0">
    <table class="table table-striped align-middle mb-0">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Brand</th><th>Category</th><th>Cost</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products()">
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.brand }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.cost }}</td>
          <td>
            <a class="btn btn-sm btn-outline-primary me-2" [routerLink]="['/products', product.id]">View</a>
            <button class="btn btn-sm btn-outline-success me-2" type="button" (click)="addToCart(product)" *ngIf="isUser()">Add to Cart</button>
            <a class="btn btn-sm btn-outline-secondary me-2" [routerLink]="['/products/update', product.id]" *ngIf="isAdmin()">Edit</a>
            <button class="btn btn-sm btn-outline-danger" type="button" (click)="remove(product.id)" *ngIf="isAdmin()">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="mb-0" *ngIf="products().length === 0">No products found.</p>
  <p class="text-success mb-0" *ngIf="success()">{{ success() }}</p>
  <p class="text-danger mb-0" *ngIf="error()">{{ error() }}</p>
</section>
