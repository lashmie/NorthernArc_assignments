<div class="bg-light d-flex align-items-center min-vh-100">
  <main class="container">
    <div class="row justify-content-center w-100 m-0">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4 p-0">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle p-3 mb-2 shadow-sm">
            <i class="bi bi-shield-lock-fill fs-3"></i>
          </div>
          <h1 class="h3 mb-1 fw-bold text-dark">asStore</h1>
          <p class="text-muted small">Authentication Endpoint: <code>POST /auth/login</code></p>
        </div>

        <div class="card shadow border-0">
          <div class="card-body p-4 p-sm-5">
            <h2 class="h5 fw-semibold text-center mb-4">Sign in to your account</h2>

            <form
              #rawLoginForm="ngForm"
              (ngSubmit)="onSubmit(rawLoginForm.valid)"
              class="needs-validation"
              [ngClass]="{ 'was-validated': formSubmitted }"
              novalidate
            >
              <div class="mb-3">
                <label for="username" class="form-label fw-medium">Username</label>
                <div class="input-group has-validation">
                  <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    [(ngModel)]="credentials.username"
                    required
                    autocomplete="username"
                  />
                  <div class="invalid-feedback">Please enter your username.</div>
                </div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <label for="password" class="form-label fw-medium mb-0">Password</label>
                  <a routerLink="/register" class="text-decoration-none small text-primary fw-medium">Need account?</a>
                </div>
                <div class="input-group has-validation">
                  <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                  <input
                    [type]="hidePassword ? 'password' : 'text'"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    [(ngModel)]="credentials.password"
                    required
                    autocomplete="current-password"
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    (click)="togglePasswordVisibility()"
                    aria-label="Toggle password visibility"
                  >
                    <i class="bi" [ngClass]="hidePassword ? 'bi-eye' : 'bi-eye-slash'"></i>
                  </button>
                  <div class="invalid-feedback">Please enter your password.</div>
                </div>
              </div>

              <p class="text-danger mb-3" *ngIf="error()">{{ error() }}</p>

              <div class="d-grid mb-2">
                <button type="submit" class="btn btn-dark py-2 fw-semibold shadow-sm" [disabled]="loading()">
                  {{ loading() ? 'Signing In...' : 'Sign In' }}
                  <i class="bi bi-arrow-right-short ms-1"></i>
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="text-center mt-4">
          <p class="text-muted small mb-0">
            New user? <a routerLink="/register" class="text-decoration-none fw-medium text-dark">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </main>
</div>
