<section class="card shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h2 class="h4 mb-0">Customers</h2>
    <a class="btn btn-sm btn-primary" routerLink="/customers/add">Add Customer</a>
  </div>

  <p class="text-danger" *ngIf="error()">{{ error() }}</p>
  <p class="text-success" *ngIf="success()">{{ success() }}</p>

  <div class="table-responsive" *ngIf="customers().length > 0">
    <table class="table table-striped align-middle mb-0">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Address</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let customer of customers()">
          <td>{{ customer.id }}</td>
          <td>{{ customer.name }}</td>
          <td>{{ customer.email }}</td>
          <td>{{ customer.address }}</td>
          <td>
            <a class="btn btn-sm btn-outline-primary me-2" [routerLink]="['/customers', customer.id]">View</a>
            <a class="btn btn-sm btn-outline-secondary me-2" [routerLink]="['/customers/update', customer.id]">Edit</a>
            <button class="btn btn-sm btn-outline-danger" type="button" (click)="remove(customer.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="mb-0" *ngIf="!error() && customers().length === 0">No customers found.</p>
</section>
