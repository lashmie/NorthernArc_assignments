<section class="card shadow-sm">
  <h2 class="h4 mb-3">Update Customer</h2>
  <form class="d-grid gap-3" (ngSubmit)="submit()">
    <label class="form-label mb-0">Name <input class="form-control" name="name" [(ngModel)]="model.name" /></label>
    <label class="form-label mb-0">Email <input class="form-control" name="email" [(ngModel)]="model.email" /></label>
    <label class="form-label mb-0">Address <input class="form-control" name="address" [(ngModel)]="model.address" /></label>
    <button class="btn btn-primary" type="submit" [disabled]="loading()">{{ loading() ? 'Updating...' : 'Update' }}</button>
  </form>
  <p class="text-success mt-3 mb-0" *ngIf="success()">{{ success() }}</p>
  <p class="text-danger mt-3 mb-0" *ngIf="error()">{{ error() }}</p>
</section>
