<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" aria-hidden="true">
  <circle cx="50" cy="50" r="38" fill="none" stroke="#e6edf5" stroke-width="10" />
  <circle cx="50" cy="50" r="38" fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round" stroke-dasharray="180 90">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
