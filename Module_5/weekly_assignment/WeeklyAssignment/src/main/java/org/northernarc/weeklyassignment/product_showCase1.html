<!DOCTYPE html>
<html>
<head>
    <title>Product CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body onload="drawTable()" class="bg-info-subtle">

<div class="container mt-4">

    <div class="bg-success text-white rounded p-3 mb-4 shadow">
        <h2 class="text-center">Inventory Management</h2>
    </div>

    <div id="drawTable"></div>

    <div class="card shadow-sm p-4 mb-4">

        <h5 class="mb-3">Enter Item Details</h5>

        <div class="row g-3">

            <div class="col-md-3">
                <input type="text" id="pname" class="form-control" placeholder="Item Name">
            </div>

            <div class="col-md-3">
                <input type="text" id="brand" class="form-control" placeholder="Company">
            </div>

            <div class="col-md-3">
                <input type="text" id="category" class="form-control" placeholder="Department">
            </div>

            <div class="col-md-3">
                <input type="number" id="cost" class="form-control" placeholder="Price">
            </div>

        </div>

        <div class="mt-4">

            <button class="btn btn-success me-2" onclick="addRow()">
                Add Item
            </button>

            <button class="btn btn-outline-primary" onclick="updateRow()">
                Update Item
            </button>

        </div>

    </div>

    <div class="mt-3">

        <button class="btn btn-primary" onclick="addRow()">
            Add Product
        </button>

        <button class="btn btn-warning" onclick="updateRow()">
            Update Product
        </button>

    </div>

</div>

<script>

    var products=[

        {
            productName:"Office Chair",
            productBrand:"Nilkamal",
            category:"Furniture",
            cost:4500
        },

        {
            productName:"Study Table",
            productBrand:"Home Centre",
            category:"Furniture",
            cost:6500
        },

        {
            productName:"Mixer Grinder",
            productBrand:"Prestige",
            category:"Kitchen",
            cost:3200
        },

        {
            productName:"LED Lamp",
            productBrand:"Philips",
            category:"Lighting",
            cost:1200
        }

    ];

    var updateIndex=-1;

    function addRow(){

        var pname=document.getElementById("pname").value;
        var brand=document.getElementById("brand").value;
        var category=document.getElementById("category").value;
        var cost=parseInt(document.getElementById("cost").value);

        if(pname!="" && brand!="" && category!="" && cost!="")
        {
            products.push({
                productName:pname,
                productBrand:brand,
                category:category,
                cost:cost
            });

            clearFields();

            drawTable();
        }
        else
        {
            alert("Enter all fields");
        }

    }

    function editRow(i){

        document.getElementById("pname").value=products[i].productName;
        document.getElementById("brand").value=products[i].productBrand;
        document.getElementById("category").value=products[i].category;
        document.getElementById("cost").value=products[i].cost;

        updateIndex=i;

    }

    function updateRow(){

        if(updateIndex==-1)
        {
            alert("Select a product to update.");
            return;
        }

        products[updateIndex].productName=document.getElementById("pname").value;
        products[updateIndex].productBrand=document.getElementById("brand").value;
        products[updateIndex].category=document.getElementById("category").value;
        products[updateIndex].cost=parseInt(document.getElementById("cost").value);

        updateIndex=-1;

        clearFields();

        drawTable();

    }

    function deleteRow(i){

        products.splice(i,1);

        drawTable();

    }

    function sortTable(choice){

        if(choice==1)
        {
            products.sort(function(a,b){
                return a.productName.localeCompare(b.productName);
            });
        }

        if(choice==2)
        {
            products.sort(function(a,b){
                return a.productBrand.localeCompare(b.productBrand);
            });
        }

        if(choice==3)
        {
            products.sort(function(a,b){
                return a.category.localeCompare(b.category);
            });
        }

        if(choice==4)
        {
            products.sort(function(a,b){
                return a.cost-b.cost;
            });
        }

        drawTable();

    }

    function clearFields(){

        document.getElementById("pname").value="";
        document.getElementById("brand").value="";
        document.getElementById("category").value="";
        document.getElementById("cost").value="";

    }

    function drawTable(){

        var content="<table class='table table-bordered table-striped table-hover'>";

        content+="<thead class='table-primary'>";

        content+="<tr>";

        content+="<th onclick='sortTable(1)'>Product Name</th>";

        content+="<th onclick='sortTable(2)'>Brand</th>";

        content+="<th onclick='sortTable(3)'>Category</th>";

        content+="<th onclick='sortTable(4)'>Cost</th>";

        content+="<th>Actions</th>";

        content+="</tr>";

        content+="</thead>";

        content+="<tbody>";

        for(var i=0;i<products.length;i++)
        {

            content+="<tr>";

            content+="<td>"+products[i].productName+"</td>";

            content+="<td>"+products[i].productBrand+"</td>";

            content+="<td><span class='badge bg-info text-dark'>"+products[i].category+"</span></td>";

            content+="<td>"+products[i].cost+"</td>";

            content+="<td>";

            content+="<button class='btn btn-success btn-sm me-2' onclick='editRow("+i+")'>Edit</button>";

            content+="<button class='btn btn-danger btn-sm' onclick='deleteRow("+i+")'>Delete</button>";

            content+="</td>";

            content+="</tr>";

        }

        content+="</tbody>";

        content+="</table>";

        document.getElementById("drawTable").innerHTML=content;

    }

</script>

</body>
</html>
