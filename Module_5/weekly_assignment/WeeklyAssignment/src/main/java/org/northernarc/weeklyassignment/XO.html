<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        td{

            width:100px;

            height:100px;

            text-align:center;

            vertical-align:middle;

            font-size:40px;

            cursor:pointer;

        }

    </style>

</head>

<body onload="drawTable()">

<div class="container mt-5">

    <h2 class="text-center">Tic Tac Toe</h2>

    <div id="content"></div>

    <h3 id="result" class="text-center mt-3"></h3>

</div>

<script>

    var board=[

        ["","",""],

        ["","",""],

        ["","",""]

    ];

    var count=0;

    var gameOver=false;

    function drawTable()

    {

        var table="<table class='table table-bordered text-center w-50 mx-auto'>";

        for(var i=0;i<3;i++)

        {

            table+="<tr>";

            for(var j=0;j<3;j++)

            {

                table+="<td onclick='fillBox("+i+","+j+")'>";

                table+=board[i][j];

                table+="</td>";

            }

            table+="</tr>";

        }

        table+="</table>";

        document.getElementById("content").innerHTML=table;

    }

    function fillBox(i,j)

    {

        if(gameOver)

        {

            alert("Game Over");

            return;

        }

        if(board[i][j]!="")

        {

            alert("Box already filled");

            return;

        }

        count++;

        if(count%2==1)

        {

            board[i][j]="X";

        }

        else

        {

            board[i][j]="O";

        }

        drawTable();

        checkWinner();

    }

    function checkWinner() {

        // Check Rows

        for (var i = 0; i < 3; i++) {

            if (board[i][0] != "" &&

                board[i][0] == board[i][1] &&

                board[i][1] == board[i][2]) {

                winner(board[i][0]);

                return;

            }

        }

        // Check Columns

        for (var j = 0; j < 3; j++) {

            if (board[0][j] != "" &&

                board[0][j] == board[1][j] &&

                board[1][j] == board[2][j]) {

                winner(board[0][j]);

                return;

            }

        }

        // Main Diagonal

        if (board[0][0] != "" &&

            board[0][0] == board[1][1] &&

            board[1][1] == board[2][2]) {

            winner(board[0][0]);

            return;

        }

        // Other Diagonal

        if (board[0][2] != "" &&

            board[0][2] == board[1][1] &&

            board[1][1] == board[2][0]) {

            winner(board[0][2]);

            return;

        }

        // Match Draw

        if (count == 9) {

            gameOver = true;

            document.getElementById("result").innerHTML = "Match Draw";

            setTimeout(function () {

                if (confirm("Match Draw!\n\nStart Next Game?")) {

                    location.reload();

                }

            }, 100);

        }

    }

    function winner(player)

    {

        gameOver = true;

        document.getElementById("result").innerHTML = player + " Wins";

        setTimeout(function(){

            if(confirm(player + " Wins!\n\nStart Next Game?"))

            {

                location.reload();

            }

        },100);

    }

</script>

</body>
</html>
