<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Example</title>
</head>
<body>

<script>
    function myPromise() {
        return new Promise((resolve, reject) => {

            setTimeout(() => {
                let answer = Math.round(Math.random());

                if (answer === 1) {
                    resolve();
                } else {
                    reject();
                }
            }, Math.random() * 5000);

        });
        console.log("exiting...")
    }

 

    myPromise()
        .then(()=>{
    alert("hey winnerr............");
        })
        .catch(()=>{
                    alert("hey loser........");
        });
</script>

</body>
</html>
