<!DOCTYPE html>
<html lang="en">

<body>
    <button onclick="demo()">Start</button>
</body>
<script>
    function demo(){
        console.log("Starting..");
        setTimeout(()=>{
            console.log("Inside time out...");
        },1000)//asynchronous -> non blocking ->causing some trouble the developer..
        console.log("Exiting!!!..");
    }
</script>
