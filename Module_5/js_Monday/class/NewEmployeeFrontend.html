<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee CRUD</title>

    <style>
        #content {
            color: red;
            font-size: 30px;
        }

        button,
        input {
            color: white;
            background-color: black;
            border: 4px outset grey;
            font-size: 20px;
            margin: 5px;
        }

        button:hover {
            border: 4px inset grey;
        }
    </style>
</head>

<body>

<input type="text" id="additem" placeholder="Enter name">
<input type="number" id="additem2" placeholder="Enter salary">

<button onclick="employeeComponent.add()">Add</button>
<button onclick="employeeComponent.sortdemo()">Sort</button>
<button onclick="employeeComponent.rsortdemo()">Reverse Sort</button>

<div id="content"></div>

<script>

class EmployeeComponent {

    constructor() {
        this.names = [];
    }

    Template() {

        let content = "<ol>";

        for (let i = 0; i < this.names.length; i++) {

            content += `
            <li>
                ${this.names[i].name.toUpperCase()}
                - ₹${this.names[i].salary}

                <button onclick="employeeComponent.remove(${this.names[i].id})">
                    Remove
                </button>

                <button onclick="employeeComponent.update(${this.names[i].id})">
                    Update
                </button>
            </li>
            `;
        }

        content += "</ol>";

        document.getElementById("content").innerHTML = content;
    }

    getAll() {

        fetch("http://localhost:8080/api/employees", {
            method: "GET"
        })
        .then(response => response.json())
        .then(data => {

            this.names = data;
            this.Template();

        })
        .catch(error => {

            console.log("Error: ", error);

        });
    }

    sortdemo() {

        fetch("http://localhost:8080/api/employees/salary-sort", {
            method: "GET"
        })
        .then(response => response.json())
        .then(data => {

            this.names = data;
            this.Template();

        })
        .catch(error => console.log(error));
    }

    rsortdemo() {

        fetch("http://localhost:8080/api/employees/salary-rsort", {
            method: "GET"
        })
        .then(response => response.json())
        .then(data => {

            this.names = data;
            this.Template();

        })
        .catch(error => console.log(error));
    }

    add() {

        const newname =
            document.getElementById("additem").value;

        const newsal =
            parseFloat(document.getElementById("additem2").value);

        const employee = {
            name: newname,
            salary: newsal
        };

        fetch("http://localhost:8080/api/employees", {

            method: "POST",
            body: JSON.stringify(employee),
            headers: {
                "Content-Type": "application/json"
            }

        })
        .then(response => {

            if (response.ok) {

                alert("Employee Added Successfully");

                this.getAll();

            } else {

                console.log(response);
            }
        })
        .catch(error => console.log(error));
    }

    remove(id) {

        fetch(`http://localhost:8080/api/employees/${id}`, {

            method: "DELETE"

        })
        .then(response => {

            if (response.ok) {

                alert("Employee Deleted");
                this.getAll();

            } else {

                console.log(response);
            }
        })
        .catch(error => {

            console.log("Delete Error : " + error);

        });
    }

    update(id) {

        const newname =
            document.getElementById("additem").value;

        const newsal =
            parseFloat(document.getElementById("additem2").value);

        let employee =
            this.names.find(emp => emp.id == id);

        if (!employee) {

            alert("Employee not found");
            return;
        }

        employee.name = newname;
        employee.salary = newsal;

        fetch(`http://localhost:8080/api/employees/${id}`, {

            method: "PUT",
            body: JSON.stringify(employee),
            headers: {
                "Content-Type": "application/json"
            }

        })
        .then(response => {

            if (response.ok) {

                alert("Employee Updated");

                this.Template();

            } else {

                console.log(response);
            }
        })
        .catch(error => console.log(error));
    }
}

const employeeComponent = new EmployeeComponent();

window.onload = function () {

    employeeComponent.getAll();
    

};

</script>

</body>
</html>
