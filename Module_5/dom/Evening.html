<script>
names=[];


//
function removeEmployee(id){

    fetch("http://localhost:8080/api/employees/" + id, {
        method: "DELETE"
    })
    .then(response => {
        if(response.ok){
            alert("Employee Deleted Successfully");
            getAll();   // Reload the list
        }
        else{
            alert("Delete Failed");
        }
    })
    .catch(err => {
        console.log(err);
    });

}

function drawlist(){

    var content="<ol>";

    for(let i=0;i<names.length;i++){

        content += `
        <li>
            ${names[i].name.toUpperCase()}

            <button onclick="removeEmployee(${names[i].id})">
                Remove
            </button>
<button onclick="update(${names[i].id})">update</button>

        </li>`;
    }

    content += "</ol>";

    document.getElementById("content").innerHTML = content;
}



window.onload=function (){
getAll();
}
function getAll(){
fetch("http://localhost:8080/api/employees",{method:"GET"})
.then((response)=>{
return response.json();
})
.then(data =>{
console.log(data);
names= data;
drawlist();
})
.catch(err=>{
console.log("There was some problem in contacting the server: "+err)
});
}

//update employee
function update(id) {

    let employee = names.find(emp => emp.id == id);

    employee.name = prompt("Enter Name", employee.name);
    employee.salary = prompt("Enter Salary", employee.salary);

    fetch(`http://localhost:8080/api/employees/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(employee)
    })
        .then(response => {
            if(response.ok){
                alert("Updated Successfully");
                drawlist();
            }
        });
}
