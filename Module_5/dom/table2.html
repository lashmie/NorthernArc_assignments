  var names = ["Sachin" , "Virat", "Dhoni", "Rohit"];
 
    function drawlist(){
        var content = "<ol>";
        for(var i = 0; i < names.length; i++){
            content += `<li> ${names[i]} <button onclick="removePlayer('${names[i]}')"> Remove </button> </li>`;
           
        }
        content += "</ol>";
        document.getElementById("content").innerHTML = content;
    }
 
        function sortdemo(){
        names.sort();
        }
 
 
        function removePlayer(player){
            names = names.filter(name => name !== player);
            drawlist();
