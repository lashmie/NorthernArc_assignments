<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Management</title>
</head>
<body>

    <h2>Name Management</h2>

    <input type="text" id="txtName" placeholder="Enter Name">
    <button onclick="add()">Add</button>

    <br><br>

    <div id="tableData"></div>

<script>

var names = [];

// Display the table
function drawTable() {

    var content = `
    <table border="1" cellpadding="10">
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Action</th>
        </tr>`;

    for (var i = 0; i < names.length; i++) {

        content += `
        <tr>
            <td>${i + 1}</td>
            <td>${names[i].name.toUpperCase()}</td>
            <td>
                <button onclick="deleteName(${names[i].id})">
                    Delete
                </button>
            </td>
        </tr>`;
    }

    content += "</table>";

    document.getElementById("tableData").innerHTML = content;
}

// Get all names
function getAll() {

    fetch("http://localhost:8080/api/names")

    .then(response => response.json())

    .then(data => {

        names = data;

        drawTable();

    })

    .catch(err => {

        console.log(err);

    });

}

// Add a new name
function add() {

    var newName = document.getElementById("txtName").value;

    if (newName.trim() == "") {
        alert("Please enter a name");
        return;
    }

    fetch("http://localhost:8080/api/names", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            name: newName
        })

    })

    .then(response => response.json())

    .then(data => {

        console.log(data);

        document.getElementById("txtName").value = "";

        getAll();

    })

    .catch(err => {

        console.log(err);

    });

}


function deleteName(id) {

    if (!confirm("Are you sure you want to delete this name?")) {
        return;
    }

    fetch("http://localhost:8080/api/names/" + id, {

        method: "DELETE"

    })

    .then(response => response.text())

    .then(message => {

        alert(message);

        getAll();

    })

    .catch(err => {

        console.log(err);

    });

}

// Load data when page opens
window.onload = function () {

    getAll();

};

</script>

</body>
</html>
