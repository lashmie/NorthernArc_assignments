spring.application.name=LoanEmi
# Database Configuration

spring.datasource.url=jdbc:postgresql://localhost:5432/northernarc

spring.datasource.username=postgres

spring.datasource.password=12345

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.org.northernarc.loanemi=INFO
logging.level.org.springframework.security=INFO

# CORS Configuration
cors.allowed.origins=http://localhost:4200,http://localhost:3000,http://localhost:8080

server.port=8080
